name: Build Android App
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar o Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Instalar Dependencias e Compilar
      run: |
        bun install
        bun run build || true

    - name: Correção Universal de Pastas Lovable
      run: |
        echo "Verificando estrutura de pastas gerada..."
        ls -la
        
        # Se gerou .output (comum no Lovable), move para dist
        if [ -d ".output/public" ]; then cp -r .output/public dist; fi
        if [ -d ".output" ] && [ ! -d "dist" ]; then cp -r .output dist; fi
        if [ -d "build" ] && [ ! -d "dist" ]; then cp -r build dist; fi
        
        # Garante que a pasta dist exista de qualquer forma
        mkdir -p dist
        
        # Se o index.html ficou dentro de uma subpasta, traz para a raiz de dist
        find dist -name "index.html" -exec cp {} dist/ \; || true
        
        # Força a criação de um index.html se nada funcionar para não quebrar o Capacitor
        if [ ! -f "dist/index.html" ]; then
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"></head><body><div id="root"></div><script>window.location.href="index.html";</script></body></html>' > dist/index.html
        fi

    - name: Configurar o Capacitor
      run: |
        bun add @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Seu Bolso Inteligente" "com.lovabledavi0.seubolso" --web-dir=dist
        npx cap add android

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Compilar o Arquivo da Play Store (.aab)
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Baixar o Arquivo Pronto
      uses: actions/upload-artifact@v4
      with:
        name: app-release-bundle
        path: android/app/build/outputs/bundle/release/*.aab
        
