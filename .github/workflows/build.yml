name: Build Android App
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 24
    - run: npm install
    - run: npm run build --if-present
    - name: Garantir pasta de assets para o Capacitor
      run: |
        mkdir -p dist
        if [ -d "build" ] && [ ! -f "dist/index.html" ]; then cp -r build/* dist/; fi
        if [ ! -f "dist/index.html" ]; then echo "<script>window.location.href='index.html';</script>" > dist/index.html; fi
    - run: npm install @capacitor/core @capacitor/cli @capacitor/android
    - run: npx cap init "Seu Bolso Inteligente" "com.lovabledavi0.seubolso" --web-dir=dist
    - run: npx cap add android
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Build Android Bundle (AAB)
      run: |
        cd android
        ./gradlew bundleRelease
    - name: Upload App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: app-release-bundle
        path: android/app/build/outputs/bundle/release/*.aab
        
