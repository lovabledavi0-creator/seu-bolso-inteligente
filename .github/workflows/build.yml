name: Build Android App
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar o Bun (Gerenciador do Lovable)
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Instalar Dependencias e Compilar
      run: |
        bun install
        bun run build

    - name: Configurar o Capacitor
      run: |
        bun add @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Seu Bolso Inteligente" "com.lovabledavi0.seubolso" --web-dir=dist
        npx cap add android

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compilar o Arquivo da Play Store (.aab)
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Baixar o Arquivo Pronto
      uses: actions/upload-artifact@v4
      with:
        name: app-release-bundle
        path: android/app/build/outputs/bundle/release/*.aab
        
